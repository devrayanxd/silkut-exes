name: Build Silkut

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.0)'
        required: true
        default: 'v2.0'

jobs:

  build-windows:
    runs-on: windows-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pillow pyinstaller

      - name: Pre-cache ffmpeg
        run: python -c "import static_ffmpeg; static_ffmpeg.add_paths()"

      - name: Create Silkut.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('Silkut.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          imgs  = [img.resize(s, Image.LANCZOS) for s in sizes]
          imgs[0].save('Silkut.ico', format='ICO', sizes=sizes, append_images=imgs[1:])
          "

      - name: Create version.txt
        shell: bash
        run: |
          cat > version.txt << 'EOF'
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=(2,0,0,0),
              prodvers=(2,0,0,0),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0,0)
            ),
            kids=[
              StringFileInfo([
                StringTable(u'040904B0',[
                  StringStruct(u'CompanyName',      u'Orvil Software'),
                  StringStruct(u'FileDescription',  u'Silkut'),
                  StringStruct(u'FileVersion',      u'2.0.0'),
                  StringStruct(u'InternalName',     u'Silkut'),
                  StringStruct(u'LegalCopyright',   u'Orvil Software'),
                  StringStruct(u'OriginalFilename', u'Silkut.exe'),
                  StringStruct(u'ProductName',      u'Silkut'),
                  StringStruct(u'ProductVersion',   u'2.0.0'),
                ])
              ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          EOF

      - name: Build Silkut.exe
        run: >
          pyinstaller app.py
          --name Silkut
          --onefile
          --noconsole
          --icon Silkut.ico
          --add-data "app.html;."
          --add-data "Silkut.png;."
          --collect-all static_ffmpeg
          --collect-all webview
          --hidden-import flask
          --hidden-import clr_loader
          --hidden-import werkzeug
          --hidden-import werkzeug.routing
          --hidden-import werkzeug.routing.exceptions
          --hidden-import difflib
          --hidden-import xml
          --hidden-import xml.etree.ElementTree
          --hidden-import pkg_resources
          --version-file version.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Silkut-Windows
          path: dist/Silkut.exe
          retention-days: 7


  build-macos:
    runs-on: macos-14
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Pre-cache ffmpeg
        run: python -c "import static_ffmpeg; static_ffmpeg.add_paths()"

      - name: Create Silkut.icns
        run: |
          mkdir -p Silkut.iconset
          sips -z 16   16   Silkut.png --out Silkut.iconset/icon_16x16.png
          sips -z 32   32   Silkut.png --out Silkut.iconset/icon_16x16@2x.png
          sips -z 32   32   Silkut.png --out Silkut.iconset/icon_32x32.png
          sips -z 64   64   Silkut.png --out Silkut.iconset/icon_32x32@2x.png
          sips -z 128  128  Silkut.png --out Silkut.iconset/icon_128x128.png
          sips -z 256  256  Silkut.png --out Silkut.iconset/icon_128x128@2x.png
          sips -z 256  256  Silkut.png --out Silkut.iconset/icon_256x256.png
          sips -z 512  512  Silkut.png --out Silkut.iconset/icon_256x256@2x.png
          sips -z 512  512  Silkut.png --out Silkut.iconset/icon_512x512.png
          cp Silkut.png Silkut.iconset/icon_512x512@2x.png
          iconutil -c icns Silkut.iconset -o Silkut.icns

      - name: Build Silkut.app
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: >
          pyinstaller app.py
          --name Silkut
          --windowed
          --icon Silkut.icns
          --add-data "app.html:."
          --add-data "Silkut.png:."
          --collect-all static_ffmpeg
          --collect-all webview
          --hidden-import flask
          --hidden-import werkzeug
          --hidden-import werkzeug.routing
          --hidden-import werkzeug.routing.exceptions
          --hidden-import difflib
          --hidden-import xml
          --hidden-import xml.etree.ElementTree
          --hidden-import pkg_resources

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package Silkut.dmg
        run: |
          create-dmg \
            --volname "Silkut" \
            --volicon "Silkut.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Silkut.app" 150 185 \
            --hide-extension "Silkut.app" \
            --app-drop-link 450 185 \
            "Silkut.dmg" \
            "dist/"

      - name: Compress DMG
        run: |
          hdiutil convert Silkut.dmg -format UDBZ -o Silkut-compressed.dmg
          mv Silkut-compressed.dmg Silkut.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Silkut-macOS
          path: Silkut.dmg
          retention-days: 7


  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete existing release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag || github.ref_name }}"
          
          # Delete release if exists
          RELEASE_ID=$(gh release view "$TAG" --json id -q .id 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            gh release delete "$TAG" --yes
            echo "Deleted release $TAG"
          fi
          
          # Delete tag if exists
          git push origin ":refs/tags/$TAG" 2>/dev/null || echo "Tag not found or already deleted"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Silkut-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Silkut-macOS
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Silkut ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/windows/Silkut.exe
            artifacts/macos/Silkut.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}