name: Build Silkut Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pillow pyinstaller

      - name: Pre-cache ffmpeg
        run: python -c "import static_ffmpeg; static_ffmpeg.add_paths()"

      - name: Create Silkut.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('Silkut.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          imgs  = [img.resize(s, Image.LANCZOS) for s in sizes]
          imgs[0].save('Silkut.ico', format='ICO', sizes=sizes, append_images=imgs[1:])
          "

      - name: Create version.txt
        shell: bash
        run: |
          cat > version.txt << 'EOF'
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=(2,0,0,0),
              prodvers=(2,0,0,0),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0,0)
            ),
            kids=[
              StringFileInfo([
                StringTable(u'040904B0',[
                  StringStruct(u'CompanyName',      u'Orvil Software'),
                  StringStruct(u'FileDescription',  u'Silkut'),
                  StringStruct(u'FileVersion',      u'2.0.0'),
                  StringStruct(u'InternalName',     u'Silkut'),
                  StringStruct(u'LegalCopyright',   u'Orvil Software'),
                  StringStruct(u'OriginalFilename', u'Silkut.exe'),
                  StringStruct(u'ProductName',      u'Silkut'),
                  StringStruct(u'ProductVersion',   u'2.0.0'),
                ])
              ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          EOF

      - name: Build Silkut.exe
        run: >
          pyinstaller app.py
          --name Silkut
          --onefile
          --noconsole
          --icon Silkut.ico
          --add-data "app.html;."
          --add-data "Silkut.png;."
          --collect-all static_ffmpeg
          --collect-all webview
          --hidden-import flask
          --hidden-import clr_loader
          --version-file version.txt
          --exclude-module matplotlib
          --exclude-module numpy
          --exclude-module pandas
          --exclude-module scipy
          --exclude-module PIL
          --exclude-module tkinter
          --exclude-module unittest
          --exclude-module email
          --exclude-module html
          --exclude-module http
          --exclude-module xml
          --exclude-module pydoc
          --exclude-module doctest
          --exclude-module difflib
          --exclude-module ftplib
          --exclude-module smtplib
          --exclude-module telnetlib
          --exclude-module turtle

      - name: Upload Silkut.exe
        uses: actions/upload-artifact@v4
        with:
          name: Silkut-Windows
          path: dist/Silkut.exe
          retention-days: 7
